name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint · Tests · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le client Prisma
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Tests unitaires
        run: npm run test:run

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_API_URL: https://sterplatform.bichetapps.com
          # Variables runtime (non injectées au build, déclarées pour éviter les warnings Next.js)
          DATABASE_URL: placeholder
          STRIPE_SECRET_KEY: placeholder
          STRIPE_WEBHOOK_SECRET: placeholder
          STER_API_TOKEN: placeholder
