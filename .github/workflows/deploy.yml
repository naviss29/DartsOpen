name: Deploy → Production

# Désactivé : Coolify redéploie automatiquement sur push main via GitHub polling.
# Réactiver si Coolify est accessible publiquement sur son port API (8000).
# on:
#   push:
#     branches: [main]

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Déploiement Coolify
    runs-on: ubuntu-latest

    steps:
      - name: Déclencher le déploiement Coolify
        run: |
          curl --silent --fail -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"
        timeout-minutes: 2
