services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: dartsopen
      POSTGRES_USER: dartsopen
      POSTGRES_PASSWORD: dartsopen
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dartsopen -d dartsopen"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
